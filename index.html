<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  >
  <meta name="theme-color" content="#ff4f87">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Crashout">

  <title>Crashout</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="game" aria-live="polite">

    <section id="setupScreen" class="setup-screen" aria-hidden="false">
      <div class="setup-panel">
        <div class="setup-panel__brand">CRASHOUT</div>
        <h1 class="setup-panel__title">WHERE ARE WE<br>CRASHING OUT?</h1>

        <div class="setup-options" role="group" aria-label="Choose a setting">
          <button
            class="setting-option"
            type="button"
            data-setting="bar"
            style="--option-index: 0"
          >
            <span class="setting-option__icon" aria-hidden="true">🍻</span>
            <span>BAR</span>
          </button>

          <button
            class="setting-option"
            type="button"
            data-setting="pregame-house"
            style="--option-index: 1"
          >
            <span class="setting-option__icon" aria-hidden="true">🥂</span>
            <span>PREGAME / HOUSE</span>
          </button>

          <button
            class="setting-option"
            type="button"
            data-setting="house-party"
            style="--option-index: 2"
          >
            <span class="setting-option__icon" aria-hidden="true">🏠</span>
            <span>HOUSE PARTY</span>
          </button>

          <button
            class="setting-option"
            type="button"
            data-setting="anywhere"
            style="--option-index: 2"
          >
            <span class="setting-option__icon" aria-hidden="true">🌎</span>
            <span>ANYWHERE</span>
          </button>
        </div>
      </div>
    </section>
    <header class="brand">
      <div class="brand__name">CRASHOUT</div>
      <div id="status" class="brand__status">Put 2–5 fingers down</div>
    </header>

    <section
      id="touchLayer"
      class="touch-layer"
      aria-label="Finger selection area"
    ></section>

    <section id="promptScreen" class="prompt-screen" aria-hidden="true">
      <div class="prompt-card">
        <div class="prompt-card__eyebrow">YOU’RE UP</div>
        <p id="promptText" class="prompt-card__text"></p>
        <button id="nextRound" class="prompt-card__button" type="button">
          NEXT ROUND
        </button>
      </div>
    </section>
  </main>

  <script src="prompts.js"></script>
  <script src="app.js"></script>
</body>
</html>
